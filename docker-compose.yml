services:
  fks_web:
    build:
      context: .
      dockerfile: Dockerfile
    user: root
    environment:
      TZ: America/Toronto
      NODE_ENV: production
    # Intentionally omit VITE_API_BASE_URL so frontend uses relative '/api' and nginx proxy.
    # If you set this to an absolute URL it will bypass the nginx proxy and may break CORS.
    # VITE_API_BASE_URL: http://fks_api:8000/api
    ports:
      - "8080:80"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./logs:/app/logs
    networks:
      - fks_net  # ensure this matches the network your fks_api service joins; add/rename if needed
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || curl -sf http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  fks_net:
    name: fks_net
    external: true